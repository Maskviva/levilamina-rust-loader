name: Release

on:
  release:
    types:
      - published

jobs:
  build-cpp:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: xmake-io/github-action-setup-xmake@v1

      - uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-

      - name: Update xmake repo
        run: xmake repo -u

      - name: Configure
        run: xmake f -a x64 -m release -p windows -y

      - name: Build
        run: xmake -w -y

      - name: Show output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse bin

      - uses: actions/upload-artifact@v4
        with:
          name: levilamina-rust-loader-${{ github.sha }}-windows-x64
          path: bin/

  update-release-notes:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}

  upload-to-release:
    needs:
      - build-cpp
      - update-release-notes

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: levilamina-rust-loader-${{ github.sha }}-windows-x64
          path: artifact

      - name: Flatten package
        shell: bash
        run: |
          cp LICENSE README.md artifact/

          echo "===== Before ====="
          find artifact

          # modpacker 输出为 bin/levilamina-rust-loader/*
          if [ -d "artifact/levilamina-rust-loader" ]; then
            mv artifact/levilamina-rust-loader/* artifact/
            rm -rf artifact/levilamina-rust-loader
          fi

          # 如果还有 bin 目录，也展开
          if [ -d "artifact/bin" ]; then
            mv artifact/bin/* artifact/
            rm -rf artifact/bin
          fi

          echo "===== After ====="
          find artifact

      - name: Create zip
        working-directory: artifact
        run: |
          zip -r ../levilamina-rust-loader-windows-x64.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: levilamina-rust-loader-windows-x64.zip