  <!--
    Composite "LeviLamina + Rust" mark for use as Socialify's `logo=` param.

    Both logos are referenced by URL (not inlined), so:
      - this file stays tiny and always mirrors the upstream logos
      - you don't need permission concerns about redrawing either brand mark
      - it only renders fully wherever the viewer has internet access to
        fetch both <image> sources (fine for GitHub/Socialify; won't render
        in viewers that block remote SVG images)

    Tweak points:
      - Rust logo color: swap /rust for /rust/COLOR (e.g. /rust/ffffff for a
        white mark on a dark Socialify theme). See https://simpleicons.org.
      - Plus sign color: the two <rect> fills below (#57606a).
      - Sizing/spacing: the x/width numbers on the two <image> tags and the
        viewBox width (340).
  -->

